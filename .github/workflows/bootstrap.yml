name: Bootstrap — initial Docker image push

# One-time workflow to push the very first image to GHCR before the automated
# release pipeline can self-host. Must be triggered manually.
#
# Access control (two layers):
#   1. GitHub Environment "bootstrap" — set Required Reviewers to repo admins
#      in Settings → Environments → bootstrap → Required reviewers.
#   2. Explicit API check below — job fails immediately if the triggering actor
#      does not have "admin" permission on this repository.
#
# After the first successful run and the release pipeline is self-sustaining,
# this file can be deleted from the repository.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push (e.g. 1.0.0). Defaults to next-version from GitVersion.yml."
        required: false
        default: ""

# Minimal permissions — write only what is needed.
permissions:
  contents: read
  packages: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    # Protected environment: only listed admins can approve the pending deployment.
    # Create this environment in: Settings → Environments → New environment → "bootstrap"
    # Then add Required reviewers (repo admins only).
    environment: bootstrap

    steps:
      - name: Verify actor has admin permission
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PERMISSION=$(gh api \
            repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission \
            --jq '.permission')
          echo "Actor '${{ github.actor }}' has permission: $PERMISSION"
          if [ "$PERMISSION" != "admin" ]; then
            echo "::error::Only repository admins may run the bootstrap workflow."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            # Fall back to next-version in GitVersion.yml
            VALUE=$(grep 'next-version:' GitVersion.yml | head -1 | awk '{print $2}')
            echo "value=${VALUE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bootstrap image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Bootstrap complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pushed image tags:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/${{ github.repository }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The release pipeline (\`release.yml\`) is now self-sustaining." >> "$GITHUB_STEP_SUMMARY"
