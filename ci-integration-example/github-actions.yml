name: CI — Build & Push with go-semver

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main

# go-semver creates git tags automatically on mainline merges — no VERSION
# file is written or committed back. The tool reads git tags directly.
permissions:
  contents: write   # required so go-semver can push the version tag to origin
  packages: write   # required for GHCR push

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.semver.outputs.version }}
      full_semver:  ${{ steps.semver.outputs.full_semver }}
      short_sha:    ${{ steps.semver.outputs.short_sha }}
      branch:       ${{ steps.semver.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # REQUIRED — go-semver reads the full git log
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run go-semver
        id: semver
        env:
          # github.head_ref is populated on pull_request events.
          # On push-to-main (after a squash merge), it is empty — go-semver falls
          # back to commit-message detection for regular merges.
          # For squash-merge workflows, pass SOURCE_BRANCH via a repository
          # variable or a workflow_dispatch input instead.
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          VERSION_JSON=$(docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e SOURCE_BRANCH \
            ghcr.io/miraccan00/go-semver:latest)

          echo "version=$(echo $VERSION_JSON     | jq -r '.MajorMinorPatch')"  >> $GITHUB_OUTPUT
          echo "full_semver=$(echo $VERSION_JSON | jq -r '.FullSemVer')"       >> $GITHUB_OUTPUT
          echo "short_sha=$(echo $VERSION_JSON   | jq -r '.ShortSha')"         >> $GITHUB_OUTPUT
          echo "branch=$(echo $VERSION_JSON      | jq -r '.EscapedBranchName')">> $GITHUB_OUTPUT

          # Fail fast on a dirty workspace
          DIRTY=$(echo "$VERSION_JSON" | jq '.UncommittedChanges')
          if [ "$DIRTY" -gt 0 ]; then
            echo "ERROR: $DIRTY uncommitted change(s) detected. Commit everything before running CI."
            exit 1
          fi

      # go-semver writes the tag into the local .git — push it back to origin.
      # Skipped on pull_request events (tag is only created on mainline merges).
      - name: Push version tag
        if: github.event_name != 'pull_request'
        run: git push --tags

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: version
    # Version fields are available as env vars throughout this job.
    # Replace the placeholder steps below with your own build commands.
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      FULL_SEMVER: ${{ needs.version.outputs.full_semver }}
      SHORT_SHA:   ${{ needs.version.outputs.short_sha }}
      BRANCH_NAME: ${{ needs.version.outputs.branch }}
    steps:
      - uses: actions/checkout@v4

      # ── Replace with your build & test commands ──────────────────────────────
      - name: Build & test
        run: |
          echo "Building version $APP_VERSION (commit $SHORT_SHA, branch $BRANCH_NAME)"
          # e.g. npm ci && npm test && npm run build
          # e.g. mvn verify -Drevision=$APP_VERSION
          # e.g. docker build --build-arg VERSION=$APP_VERSION .

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [version, build]
    steps:
      - uses: actions/checkout@v4

      # Docker registry tags must be lowercase — github.repository can contain
      # uppercase letters (e.g. "MyOrg/My-Repo"). Normalize here.
      - name: Set lowercase image name
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "image=${IMAGE,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ needs.version.outputs.version }}
            ${{ steps.meta.outputs.image }}:${{ needs.version.outputs.short_sha }}
            ${{ steps.meta.outputs.image }}:latest
          build-args: |
            APP_VERSION=${{ needs.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
