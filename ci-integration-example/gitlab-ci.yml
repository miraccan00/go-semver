# GitLab CI/CD — go-semver integration example
#
# Prerequisites:
#   - Set GIT_DEPTH: "0" here or in Settings > CI/CD > Variables
#     so go-semver can read the full commit history.
#   - Add REGISTRY_USER and REGISTRY_PASS to CI/CD variables
#     (or use the built-in $CI_REGISTRY_* variables for GitLab Registry).
#
# Squash-merge note:
#   go-semver auto-detects merge source from "Merge branch '…'" commit messages
#   (regular merges). For squash merges, SOURCE_BRANCH must be set so the tool
#   knows which branch was merged:
#
#     SOURCE_BRANCH: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME   ← MR pipelines only
#
#   For push pipelines on main (post-merge), $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
#   is empty. In that case, go-semver falls back to commit-message detection
#   (works for regular merges). For squash merges on push pipelines, set
#   SOURCE_BRANCH as a protected pipeline variable matching the source branch.

workflow:
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/
      when: never
    - when: always

variables:
  GIT_DEPTH: "0"                            # REQUIRED — full history for go-semver
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE: $CI_REGISTRY_IMAGE

stages:
  - version
  - test
  - build
  - publish

# ── Stage: version ────────────────────────────────────────────────────────────
semver:
  stage: version
  image: ghcr.io/miraccan00/go-semver:latest
  variables:
    # Populated on MR pipelines; empty on push pipelines (falls back to commit
    # message detection for regular merges).
    SOURCE_BRANCH: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
  script:
    - VERSION_JSON=$(semver)
    - echo "$VERSION_JSON"

    # Fail fast on dirty workspace
    - |
      DIRTY=$(echo "$VERSION_JSON" | jq '.UncommittedChanges')
      if [ "$DIRTY" -gt "0" ]; then
        echo "ERROR: $DIRTY uncommitted change(s) detected."
        exit 1
      fi

    # Export variables for downstream jobs via dotenv artifact
    - echo "APP_VERSION=$(echo $VERSION_JSON | jq -r '.MajorMinorPatch')"          >> build.env
    - echo "FULL_SEMVER=$(echo $VERSION_JSON | jq -r '.FullSemVer')"               >> build.env
    - echo "SHORT_SHA=$(echo $VERSION_JSON | jq -r '.ShortSha')"                   >> build.env
    - echo "BRANCH_NAME=$(echo $VERSION_JSON | jq -r '.EscapedBranchName')"        >> build.env

    # go-semver writes the tag into the local .git — push it back to origin.
    # CI_JOB_TOKEN has write access to the project repository by default.
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ] || echo "$CI_COMMIT_BRANCH" | grep -qE '^release/'; then
        git config user.email "ci@gitlab.com"
        git config user.name "GitLab CI"
        git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git push --tags origin
      fi
  artifacts:
    reports:
      dotenv: build.env     # APP_VERSION etc. are injected into all downstream jobs
    expire_in: 1 day

# ── Stage: test ───────────────────────────────────────────────────────────────
unit-tests:
  stage: test
  image: golang:1.24-alpine
  needs: []                 # runs in parallel with semver
  script:
    - go test ./...

# ── Stage: build ──────────────────────────────────────────────────────────────
build-binary:
  stage: build
  image: golang:1.24-alpine
  needs: [semver]           # APP_VERSION injected via dotenv
  script:
    - echo "Building version $APP_VERSION (commit $SHORT_SHA)"
    - |
      go build \
        -ldflags "-X main.version=$APP_VERSION -X main.commit=$SHORT_SHA" \
        -o dist/myapp \
        ./cmd/myapp
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

build-docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  needs: [semver]
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - |
      docker build \
        --build-arg APP_VERSION=$APP_VERSION \
        --tag $IMAGE:$APP_VERSION \
        --tag $IMAGE:$SHORT_SHA \
        --tag $IMAGE:$BRANCH_NAME \
        .
    # Save image tar for the publish stage (avoids rebuilding)
    - docker save $IMAGE:$APP_VERSION | gzip > image.tar.gz
  artifacts:
    paths:
      - image.tar.gz
    expire_in: 1 day

# ── Stage: publish ────────────────────────────────────────────────────────────
push-docker:
  stage: publish
  image: docker:24
  services:
    - docker:24-dind
  needs: [build-docker, semver]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker load < image.tar.gz
    - docker push $IMAGE:$APP_VERSION
    - docker push $IMAGE:$SHORT_SHA
    - docker push $IMAGE:$BRANCH_NAME
    # Tag :latest only on the default branch
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag $IMAGE:$APP_VERSION $IMAGE:latest
        docker push $IMAGE:latest
      fi
